  description: The SearchStax Provisioning API is a REST interface for creating and managing Solr deployments in the SearchStax
    Managed Search cloud. It supports deployment lifecycle management, backup and restore operations, node management, plan
    listing, usage reporting, authentication configuration, webhook management, and ZooKeeper configuration. Token-based authentication
    is used for most operations, with API key authentication available for a subset of deployment management functions.
- aid: searchstax:searchstax-site-search-api
  name: SearchStax Site Search API
  tags:
  - Search
  - Site Search
  - Studio
  - Full-Text Search
  humanURL: https://www.searchstax.com/docs/searchstudio/searchstax-studio-search-api/
  baseURL: https://search.searchstax.com
  properties:
  - url: https://www.searchstax.com/docs/searchstudio/searchstax-studio-search-api/
    type: Documentation
  description: The SearchStax Site Search API returns JSON search results from a SearchStax Studio Site Search application.
    It provides real-time search via the /emselect endpoint, supporting faceted search, auto-suggest, popular searches, related
    searches, and search analytics tracking.
