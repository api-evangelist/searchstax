description: SearchStax is a managed Solr search infrastructure company that provides cloud-hosted Apache Solr deployments
  and a Site Search platform. SearchStax eliminates the complexity of running and scaling Solr by offering fully managed dedicated
  and serverless deployments on AWS, Azure, and Google Cloud. The platform exposes a comprehensive REST Provisioning API for
  managing deployments, backup and restore, authentication, webhooks, and infrastructure configuration, along with a Site
  Search API for delivering search results from SearchStax Studio applications.
