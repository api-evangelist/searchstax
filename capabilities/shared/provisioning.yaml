naftiko: "1.0.0-alpha1"

info:
  label: "SearchStax Provisioning API"
  description: "REST API for creating and managing Solr deployments in SearchStax Managed Search cloud."
  tags:
    - Provisioning
    - Solr
    - Deployments
    - Search Infrastructure
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SEARCHSTAX_TOKEN: SEARCHSTAX_TOKEN
      SEARCHSTAX_ACCOUNT: SEARCHSTAX_ACCOUNT

capability:
  consumes:
    - type: http
      namespace: searchstax-provisioning
      baseUri: https://app.searchstax.com/api/rest/v2
      description: "SearchStax Provisioning API for Solr deployment management"
      authentication:
        type: bearer
        token: "{{SEARCHSTAX_TOKEN}}"
      resources:
        - name: deployments
          path: /account/{account_name}/deployment/
          description: "Manage Solr deployments"
          operations:
            - name: list-deployments
              method: GET
              description: "List all Solr deployments for the account"
              inputParameters:
                - name: account_name
                  in: path
                  type: string
                  required: true
                  description: "SearchStax account name"
                - name: page
                  in: query
                  type: integer
                  required: false
                  description: "Page number"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-deployment
              method: POST
              description: "Create a new Solr deployment"
              inputParameters:
                - name: account_name
                  in: path
                  type: string
                  required: true
                  description: "SearchStax account name"
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  application: "Solr"
                  application_version: "{{tools.application_version}}"
                  plan: "{{tools.plan}}"
                  region_id: "{{tools.region_id}}"
                  cloud_provider_id: "{{tools.cloud_provider_id}}"
                  termination_lock: "{{tools.termination_lock}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: deployment-detail
          path: /account/{account_name}/deployment/{uid}/
          description: "Manage a specific deployment"
          operations:
            - name: get-deployment
              method: GET
              description: "Get deployment details"
              inputParameters:
                - name: account_name
                  in: path
                  type: string
                  required: true
                - name: uid
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: delete-deployment
              method: DELETE
              description: "Delete a deployment"
              inputParameters:
                - name: account_name
                  in: path
                  type: string
                  required: true
                - name: uid
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: deployment-health
          path: /account/{account_name}/deployment/{uid}/deployment-health/
          description: "Check deployment health"
          operations:
            - name: get-deployment-health
              method: GET
              description: "Get deployment health status"
              inputParameters:
                - name: account_name
                  in: path
                  type: string
                  required: true
                - name: uid
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: backup
          path: /account/{account_name}/deployment/{uid}/backup/
          description: "Manage deployment backups"
          operations:
            - name: list-backups
              method: GET
              description: "List all backups for a deployment"
              inputParameters:
                - name: account_name
                  in: path
                  type: string
                  required: true
                - name: uid
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: create-backup
              method: POST
              description: "Create a deployment backup"
              inputParameters:
                - name: account_name
                  in: path
                  type: string
                  required: true
                - name: uid
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: nodes
          path: /account/{account_name}/deployment/{uid}/server/
          description: "Manage deployment nodes"
          operations:
            - name: list-nodes
              method: GET
              description: "List all nodes in a deployment"
              inputParameters:
                - name: account_name
                  in: path
                  type: string
                  required: true
                - name: uid
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: usage
          path: /account/{account_name}/usage/{year}/{month}/
          description: "View usage and billing data"
          operations:
            - name: get-usage
              method: GET
              description: "Get usage data for a billing period"
              inputParameters:
                - name: account_name
                  in: path
                  type: string
                  required: true
                - name: year
                  in: path
                  type: integer
                  required: true
                - name: month
                  in: path
                  type: integer
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: searchstax-provisioning-rest
      resources:
        - path: /v1/deployments
          name: deployments
          description: "Manage Solr deployments"
          operations:
            - method: GET
              name: list-deployments
              description: "List all Solr deployments"
              call: "searchstax-provisioning.list-deployments"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-deployment
              description: "Create a new Solr deployment"
              call: "searchstax-provisioning.create-deployment"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/deployments/{uid}
          name: deployment-detail
          description: "Manage a specific deployment"
          operations:
            - method: GET
              name: get-deployment
              description: "Get deployment details"
              call: "searchstax-provisioning.get-deployment"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-deployment
              description: "Delete a deployment"
              call: "searchstax-provisioning.delete-deployment"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/deployments/{uid}/health
          name: deployment-health
          description: "Deployment health status"
          operations:
            - method: GET
              name: get-deployment-health
              description: "Check deployment health"
              call: "searchstax-provisioning.get-deployment-health"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/deployments/{uid}/backups
          name: backups
          description: "Deployment backup management"
          operations:
            - method: GET
              name: list-backups
              description: "List deployment backups"
              call: "searchstax-provisioning.list-backups"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-backup
              description: "Create a deployment backup"
              call: "searchstax-provisioning.create-backup"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: searchstax-provisioning-mcp
      transport: http
      tools:
        - name: list-deployments
          description: "List all Solr deployments in a SearchStax account"
          hints:
            readOnly: true
            openWorld: false
          call: "searchstax-provisioning.list-deployments"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-deployment
          description: "Create a new managed Solr deployment"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "searchstax-provisioning.create-deployment"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-deployment
          description: "Get detailed information about a specific Solr deployment"
          hints:
            readOnly: true
            openWorld: false
          call: "searchstax-provisioning.get-deployment"
          outputParameters:
            - type: object
              mapping: "$."

        - name: delete-deployment
          description: "Delete a Solr deployment"
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "searchstax-provisioning.delete-deployment"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-deployment-health
          description: "Check the health status of a Solr deployment"
          hints:
            readOnly: true
            openWorld: false
          call: "searchstax-provisioning.get-deployment-health"
          outputParameters:
            - type: object
              mapping: "$."

        - name: list-backups
          description: "List all backups for a Solr deployment"
          hints:
            readOnly: true
            openWorld: false
          call: "searchstax-provisioning.list-backups"
          outputParameters:
            - type: object
              mapping: "$."

        - name: create-backup
          description: "Create a backup of a Solr deployment"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "searchstax-provisioning.create-backup"
          outputParameters:
            - type: object
              mapping: "$."

        - name: get-usage
          description: "Get usage and billing data for a specific month"
          hints:
            readOnly: true
            openWorld: false
          call: "searchstax-provisioning.get-usage"
          outputParameters:
            - type: object
              mapping: "$."
